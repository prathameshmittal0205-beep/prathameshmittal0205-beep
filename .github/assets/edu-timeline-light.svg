<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowhead-l" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3d59a1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="260" fill="#ffffff"/>

  <!-- Timeline base lines -->
  <line x1="90" y1="150" x2="560" y2="150" stroke="#d3d8e8" stroke-width="2"/>
  <line x1="560" y1="150" x2="840" y2="150" stroke="#d3d8e8" stroke-width="2" stroke-dasharray="6 7" marker-end="url(#arrowhead-l)"/>

  <!-- Node 1: School -->
  <circle cx="120" cy="150" r="11" fill="#2ac3de" stroke="#ffffff" stroke-width="3"/>
  <text x="120" y="104" text-anchor="middle" fill="#565a72" font-size="13" font-weight="600">2023</text>
  <text x="120" y="186" text-anchor="middle" fill="#1a1b27" font-size="14" font-weight="700">Class XII</text>
  <text x="120" y="206" text-anchor="middle" fill="#444b6e" font-size="12">CBSE &#183; 87%</text>
  <text x="120" y="224" text-anchor="middle" fill="#7a7f99" font-size="11">Ramsheth Thakur</text>
  <text x="120" y="240" text-anchor="middle" fill="#7a7f99" font-size="11">Public School</text>

  <!-- Node 2: College start -->
  <circle cx="330" cy="150" r="13" fill="#9d7cd8" stroke="#ffffff" stroke-width="3"/>
  <text x="330" y="104" text-anchor="middle" fill="#565a72" font-size="13" font-weight="600">2024</text>
  <text x="330" y="186" text-anchor="middle" fill="#1a1b27" font-size="14" font-weight="700">VIT Chennai</text>
  <text x="330" y="206" text-anchor="middle" fill="#444b6e" font-size="12">B.Tech CSE</text>
  <text x="330" y="224" text-anchor="middle" fill="#7a7f99" font-size="11">AI &amp; Robotics</text>

  <!-- Node 3: Present -->
  <circle cx="560" cy="150" r="14" fill="#3d59a1" stroke="#ffffff" stroke-width="3"/>
  <circle cx="560" cy="150" r="19" fill="none" stroke="#3d59a1" stroke-width="1.5" opacity="0.4"/>
  <text x="560" y="104" text-anchor="middle" fill="#565a72" font-size="13" font-weight="600">2026 &#8226; now</text>
