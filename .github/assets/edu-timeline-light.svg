  <text x="780" y="104" text-anchor="middle" fill="#9aa0b8" font-size="13" font-weight="600">2028</text>
  <text x="780" y="186" text-anchor="middle" fill="#6b7090" font-size="14" font-weight="600">Graduation</text>
